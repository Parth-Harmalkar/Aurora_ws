rtabmap:
  ros__parameters:
    use_sim_time: false
    database_path: "~/.aurora/rtabmap.db"
    frame_id: "base_link"
    map_frame_id: "map"
    odom_frame_id: "odom"
    subscribe_depth: true
    subscribe_rgb: true
    subscribe_scan: true
    subscribe_imu: true
    subscribe_odom_info: false
    approx_sync: true
    wait_imu_to_init: true
    queue_size: 30
    sync_queue_size: 30
    
    # RTAB-Map Internal Parameters (Industrial Hybrid Model)
    Rtabmap/DetectionRate: "1.0"
    RGBD/AngularUpdate: "0.1"    # Only map if turned > 5.7 deg
    RGBD/LinearUpdate: "0.1"     # Only map if moved > 0.1m
    RGBD/OptimizeMaxError: "20.0"
    RGBD/OptimizeFromGraphEnd: "true" # Faster local planning
    RGBD/NeighborLinkRefining: "true" # Better graph closure
    RGBD/ProximityBySpace: "true"
    
    # Visual Parameters (Optimized for Jetson Orin Nano CPU/GPU)
    Vis/MaxFeatures: "300"       # Lower for faster feature extraction
    Vis/MinInliers: "10"
    Vis/CorType: "0"             # Features Matching (Legacy/Stable on Jetson)
    Vis/BundleAdjustment: "1"
    Vis/MaxError: "0.05"
    
    # Odometry Quality Control
    Odom/ResetCountdown: "1"
    
    # Grid & Mapping (Point 1: Standard 0.1m Resolution)
    Grid/FromDepth: "true"
    Grid/3D: "true"
    Grid/Sensor: "1"
    Grid/RayTracing: "true"
    Grid/MaxObstacleHeight: "1.5"
    Grid/CellSize: "0.10"       # Industry Standard for speed
    Grid/NoiseFilteringRadius: "0.2"
    Grid/NoiseFilteringMinNeighbors: "2"
    
    # Memory Management
    Mem/IncrementalMemory: "true"
    Mem/InitWMWithAllNodes: "false"
    
    # Cloud Output (Decimated for speed)
    cloud_decimation: 2
    cloud_voxel_size: 0.05
    cloud_output_voxelized: true
