rtabmap:
  ros__parameters:
    use_sim_time: false
    database_path: "~/.aurora/rtabmap.db"
    frame_id: "base_link"
    map_frame_id: "map"
    odom_frame_id: "odom"
    subscribe_depth: true
    subscribe_rgb: true
    subscribe_scan: true
    subscribe_imu: true
    subscribe_odom_info: false
    approx_sync: true
    wait_imu_to_init: true
    queue_size: 30
    sync_queue_size: 30
    
    # RTAB-Map Internal Parameters (Industrial Hybrid Model)
    Rtabmap/DetectionRate: "1.0"
    RGBD/AngularUpdate: "0.1"    # Only map if turned > 5.7 deg
    RGBD/LinearUpdate: "0.1"     # Only map if moved > 0.1m
    RGBD/OptimizeMaxError: "10.0"
    RGBD/OptimizeFromGraphEnd: "false" # Prevent full-map rotation on odom jumps
    RGBD/NeighborLinkRefining: "true" # Better graph closure
    RGBD/ProximityBySpace: "true"
    
    # Visual Parameters (Optimized for Jetson Orin Nano CPU/GPU)
    Vis/MaxFeatures: "600"       # Higher for better stability, balanced for Jetson
    Vis/MinInliers: "10"
    Vis/CorType: "0"             # Features Matching (Legacy/Stable on Jetson)
    Vis/BundleAdjustment: "1"
    Vis/MaxError: "0.05"
    
    # Odometry Quality Control
    Odom/ResetCountdown: "1"
    
    # Grid & Mapping (Optimized for Shiny/Glossy Indoor Tiles)
    Grid/FromDepth: "false"       # false = use Grid/Sensor choice properly without forcing depth-only
    Grid/3D: "true"
    Grid/Sensor: "2"              # 0=laser, 1=depth, 2=both (use both for best map fidelity)
    Grid/RayTracing: "true"
    Grid/MapFrameProjection: "true" # Projects to map frame before estimating ground, correcting for robot pitch/roll
    Grid/NormalsSegmentation: "true" # Segment ground from obstacles using point normals
    Grid/MaxGroundAngle: "30"     # More strict ground angle for flat floors
    Grid/MaxObstacleHeight: "1.5"
    Grid/CellSize: "0.05"       
    Grid/MaxGroundHeight: "0.10"  # Reduced to prevent floor noise as obstacles
    Grid/MinGroundHeight: "-0.05"
    Grid/RangeMin: "0.30"         # Ignore base_link reflection
    Grid/RangeMax: "5.0"
    Grid/NoiseFilteringRadius: "0.2"
    Grid/NoiseFilteringMinNeighbors: "5" # Stricter filtering
    
    # Memory Management
    Mem/IncrementalMemory: "true"
    Mem/InitWMWithAllNodes: "false"
    
    # Cloud Output (Decimated for speed)
    cloud_decimation: 2
    cloud_voxel_size: 0.05
    cloud_output_voxelized: true
